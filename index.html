<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>InkSheet</title>
  <style>
    /* Core page styling */
    :root {
      color-scheme: dark;
      color: #000;
      background: #fff;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      color: #000;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: min(100%, 760px);
      max-width: 760px;
      margin: 0 auto;
      width: 100vw;
      max-width: 100vw;
      margin: 0;
      padding: 10px;
      gap: 8px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border: 2px solid #000;
      background: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      min-height: 48px;
    }
    header .logo {
      letter-spacing: 0.08em;
    }
    header .page-title {
      text-align: right;
      font-size: 0.95rem;
    }
    .page-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .page-nav button {
      flex: 1 1 31%;
      max-width: 220px;
      min-height: 44px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      padding: 10px 8px;
    }
    .page-nav button.active {
      background: #000;
      color: #fff;
    }
    .page {
      flex: 1;
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 10px 0;
      overflow: hidden;
    }
    .page.active {
      display: flex;
    }
    .section {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border: 2px solid #000;
      padding: 10px;
      background: #fff;
      flex: 1;
      min-height: 0;
    }
    .field-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    label {
      font-size: 0.9rem;
      font-weight: 700;
    }
    input[type="text"], input[type="number"], textarea {
      width: 100%;
      border: 2px solid #000;
      padding: 10px;
      font-size: 1rem;
      background: #fff;
      color: #000;
    }
    input[type="number"] {
      max-width: 100%;
    }
    .large-button {
      width: 100%;
      min-height: 48px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      padding: 12px;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    .control-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
    }
    .control-group label {
      flex: 1;
    }
    .stat-row, .money-row, .hp-row {
      display: grid;
      grid-template-columns: 1fr repeat(5, auto);
      gap: 4px;
      align-items: center;
      width: 100%;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 2px solid #000;
      padding: 12px;
      background: #fff;
      width: 100%;
    }
    .card-title {
      font-weight: 700;
      text-align: center;
      font-size: 1rem;
    }
    .card-value {
      text-align: center;
      font-size: 2rem;
      font-weight: 900;
      border: 2px solid #000;
      padding: 16px 12px;
      background: #fff;
    }
    .card-input {
      width: 100%;
      border: 2px solid #000;
      padding: 14px 10px;
      font-size: 1.6rem;
      font-weight: 900;
      text-align: center;
      background: #fff;
      color: #000;
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .card-small-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      width: 100%;
    }
    .spell-circles {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-start;
      padding-top: 4px;
    }
    .stat-name {
      font-weight: 700;
    }
    .stat-value,
    .money-value,
    .hp-value {
      width: 58px;
      text-align: center;
      font-size: 1rem;
      border: 2px solid #000;
      padding: 10px 6px;
      background: #fff;
    }
    .pill {
      width: 48px;
      min-height: 48px;
      border: 2px solid #000;
      background: #fff;
      font-size: 1.25rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      padding: 0 2px;
    }
    .modifier {
      width: 62px;
      text-align: center;
      border: 2px solid #000;
      padding: 10px 8px;
      font-size: 1rem;
      font-weight: 700;
      background: #fff;
    }
    .hp-display {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .hp-box {
      flex: 1;
      min-width: 150px;
      border: 2px solid #000;
      padding: 12px;
      text-align: center;
      background: #fff;
      font-size: 1rem;
      font-weight: 700;
    }
    .slot-row {
      display: grid;
      grid-template-columns: auto 1fr 1.5fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      padding: 10px 0;
      border-bottom: 1px solid #000;
    }
    .spell-table {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .spell-row {
      display: grid;
      grid-template-columns: auto 1fr 1.5fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      padding: 10px 0;
      border-bottom: 1px solid #000;
    }
    .spell-level {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      white-space: nowrap;
    }
    .spell-badge {
      width: 28px;
      height: 28px;
      border: 2px solid #000;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .spell-total {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .spell-total input {
      width: 100%;
      max-width: 100px;
      margin-top: 4px;
      text-align: center;
    }
    .spell-circles {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-start;
    }
    .slot-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }
    .slot-circles {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }
    .slot-circle {
      width: 60px;
      height: 60px;
      border: 2px solid #000;
      border-radius: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: #fff;
      font-size: 1rem;
      font-weight: 700;
      user-select: none;
    }
    .slot-circle.used {
      background: #000;
      color: #fff;
    }
    .footer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .help-text {
      font-size: 0.85rem;
      color: #000;
      line-height: 1.3;
    }
    .textarea-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    textarea {
      min-height: 150px;
      resize: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
    }
    .status-bar {
      font-size: 0.85rem;
      text-align: center;
      min-height: 24px;
      line-height: 24px;
      color: #000;
    }
    @media (max-width: 480px) {
      .page-nav button {
        flex: 1 1 100%;
      }
      .field-group {
        grid-template-columns: 1fr;
      }
      .stat-row, .money-row, .hp-row, .slot-row {
        grid-template-columns: 1fr;
      }
      .slot-controls {
        justify-content: space-between;
      }
      .slot-circles {
        justify-content: flex-start;
      }
      .control-group {
        flex-direction: column;
        align-items: stretch;
      }
      .hp-box {
        min-width: 100%;
      }
      .pill {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="logo">InkSheet</div>
      <div class="page-title" id="headerTitle">Character</div>
    </header>

    <nav class="page-nav" id="navButtons"></nav>

    <main class="page-container" id="pages"></main>

    <div class="status-bar" id="statusBar">Autosave enabled. Load or edit values to save automatically.</div>
  </div>

  <script>
    // Data model for the character tracker
    const STORAGE_KEY = 'inkSheetCharacter';
    const pages = ['Character', 'Stats', 'Health', 'Money', 'Spell Slots', 'Settings'];
    const currencyLabels = {
      PP: 'Platinum Coins',
      GP: 'Gold Coins',
      SP: 'Silver Coins',
      CP: 'Copper Coins',
    };
    const moneyKeys = ['PP', 'GP', 'SP', 'CP'];
    const spellLevels = [1, 2, 3, 4, 5];
    const halfCasterClasses = ['artificer', 'paladin', 'ranger'];
    const halfCasterProgression = {
      1: {},
      2: {1: 2},
      3: {1: 3, 2: 2},
      4: {1: 3, 2: 2},
      5: {1: 4, 2: 2},
      6: {1: 4, 2: 2},
      7: {1: 4, 2: 3},
      8: {1: 4, 2: 3},
      9: {1: 4, 2: 3, 3: 2},
      10: {1: 4, 2: 3, 3: 2},
      11: {1: 4, 2: 3, 3: 2},
      12: {1: 4, 2: 3, 3: 2},
      13: {1: 4, 2: 3, 3: 2},
      14: {1: 4, 2: 3, 3: 2},
      15: {1: 4, 2: 3, 3: 2},
      16: {1: 4, 2: 3, 3: 2, 4: 1},
      17: {1: 4, 2: 3, 3: 2, 4: 1},
      18: {1: 4, 2: 3, 3: 2, 4: 1},
      19: {1: 4, 2: 3, 3: 2, 4: 1},
      20: {1: 4, 2: 3, 3: 2, 4: 1, 5: 1},
    };

    const characterTemplate = {
      name: '',
      race: '',
      class: '',
      level: 1,
      stats: {
        STR: 10,
        DEX: 10,
        CON: 10,
        INT: 10,
        WIS: 10,
        CHA: 10,
      },
      health: {
        current: 10,
        max: 10,
        temp: 0,
      },
      money: {
        PP: 0,
        GP: 0,
        SP: 0,
        CP: 0,
      },
      spellSlots: Array.from({ length: 9 }, (_, index) => ({
        level: index + 1,
        max: 0,
        used: 0,
      })),
    };

    let character = loadCharacter();
    let currentPage = 0;

    const navButtons = document.getElementById('navButtons');
    const pagesContainer = document.getElementById('pages');
    const headerTitle = document.getElementById('headerTitle');
    const statusBar = document.getElementById('statusBar');

    function saveCharacter() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(character));
      statusBar.textContent = 'Saved at ' + new Date().toLocaleTimeString();
    }

    function loadCharacter() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          const parsed = JSON.parse(stored);
          return mergeCharacter(characterTemplate, parsed);
        }
      } catch (error) {
        console.error('Unable to load character', error);
      }
      return JSON.parse(JSON.stringify(characterTemplate));
    }

    function mergeCharacter(template, data) {
      const merged = JSON.parse(JSON.stringify(template));
      for (const key in data) {
        if (data[key] === null || data[key] === undefined) continue;
        if (typeof data[key] === 'object' && !Array.isArray(data[key])) {
          merged[key] = mergeCharacter(merged[key], data[key]);
        } else if (Array.isArray(data[key]) && Array.isArray(merged[key])) {
          merged[key] = data[key].map((item, idx) => mergeCharacter(merged[key][idx] || {}, item));
        } else {
          merged[key] = data[key];
        }
      }
      return merged;
    }

    function createButton(text, handler, extraClass = '') {
      const button = document.createElement('button');
      button.type = 'button';
      button.textContent = text;
      button.className = 'large-button ' + extraClass;
      button.addEventListener('click', handler);
      return button;
    }

    function createPageNavigation() {
      pages.forEach((pageName, index) => {
        const button = createButton(pageName, () => switchPage(index));
        if (index === currentPage) button.classList.add('active');
        navButtons.appendChild(button);
      });
    }

    function switchPage(index) {
      currentPage = index;
      headerTitle.textContent = pages[index];
      Array.from(navButtons.children).forEach((btn, idx) => {
        btn.classList.toggle('active', idx === index);
      });
      Array.from(pagesContainer.children).forEach((page, idx) => {
        page.classList.toggle('active', idx === index);
      });
      statusBar.textContent = 'Viewing ' + pages[index] + ' page. Changes save automatically.';
    }

    function buildApp() {
      createPageNavigation();
      pagesContainer.appendChild(buildCharacterPage());
      pagesContainer.appendChild(buildStatsPage());
      pagesContainer.appendChild(buildHealthPage());
      pagesContainer.appendChild(buildMoneyPage());
      pagesContainer.appendChild(buildSpellSlotsPage());
      pagesContainer.appendChild(buildSettingsPage());
      switchPage(currentPage);
    }

    function buildCharacterPage() {
      const page = document.createElement('section');
      page.className = 'page';
      page.innerHTML = '<div class="section"></div>';
      const section = page.firstElementChild;
      section.appendChild(createField('Name', 'name', 'text', character.name));
      section.appendChild(createField('Race', 'race', 'text', character.race));
      section.appendChild(createField('Class', 'class', 'text', character.class));
      section.appendChild(createField('Level', 'level', 'number', character.level, { min: 1, max: 20 }));
      return page;
    }

    function createField(labelText, key, type, value, attrs = {}) {
      const wrapper = document.createElement('div');
      wrapper.className = 'field';
      const label = document.createElement('label');
      label.textContent = labelText;
      const input = document.createElement('input');
      input.type = type;
      input.value = value;
      Object.entries(attrs).forEach(([attr, val]) => input.setAttribute(attr, val));
      input.addEventListener('input', () => {
        if (type === 'number') {
          character[key] = Number(input.value) || 0;
        } else {
          character[key] = input.value;
        }
        saveCharacter();
        if ((key === 'class' || key === 'level') && currentPage === 4) {
          refreshSpellSlotsPage();
        }
      });
      wrapper.appendChild(label);
      wrapper.appendChild(input);
      return wrapper;
    }

    function buildStatsPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';
      const statNames = Object.keys(character.stats);
      statNames.forEach(stat => {
        section.appendChild(createStatRow(stat));
      });
      page.appendChild(section);
      return page;
    }

    function createStatRow(stat) {
      const row = document.createElement('div');
      row.className = 'stat-row';
      const label = document.createElement('div');
      label.className = 'stat-name';
      label.textContent = stat;
      const minus = document.createElement('div');
      minus.className = 'pill';
      minus.textContent = '-';
      minus.addEventListener('click', () => adjustStat(stat, -1));
      const value = document.createElement('div');
      value.className = 'stat-value';
      value.textContent = character.stats[stat];
      const plus = document.createElement('div');
      plus.className = 'pill';
      plus.textContent = '+';
      plus.addEventListener('click', () => adjustStat(stat, 1));
      const modifier = document.createElement('div');
      modifier.className = 'modifier';
      modifier.textContent = formatModifier(calcModifier(character.stats[stat]));
      row.append(label, minus, value, plus, modifier);
      row.dataset.stat = stat;
      return row;
    }

    function adjustStat(stat, delta) {
      character.stats[stat] = Math.max(1, character.stats[stat] + delta);
      renderStats();
      saveCharacter();
    }

    function renderStats() {
      const rows = pagesContainer.querySelectorAll('.stat-row');
      rows.forEach(row => {
        const stat = row.dataset.stat;
        row.querySelector('.stat-value').textContent = character.stats[stat];
        row.querySelector('.modifier').textContent = formatModifier(calcModifier(character.stats[stat]));
      });
    }

    function calcModifier(value) {
      return Math.floor((value - 10) / 2);
    }

    function formatModifier(value) {
      return (value >= 0 ? '+' : '') + value;
    }

    function getSpellcastingInfo() {
      const className = String(character.class || '').trim();
      const normalized = className.toLowerCase();
      if (halfCasterClasses.includes(normalized)) {
        return { type: 'Half Caster', subclass: className || 'Half Caster' };
      }
      return { type: 'Spellcasting', subclass: className || 'Prepared' };
    }

    function getSpellLevelSlots(level) {
      const info = getSpellcastingInfo();
      if (info.type === 'Half Caster') {
        const charLevel = Math.min(20, Math.max(1, Number(character.level) || 1));
        return halfCasterProgression[charLevel][level] || 0;
      }
      const stored = character.spellSlots.find(s => s.level === level);
      return stored ? stored.max : 0;
    }

    function getVisibleSpellLevels() {
      const info = getSpellcastingInfo();
      if (info.type === 'Half Caster') {
        const charLevel = Math.min(20, Math.max(1, Number(character.level) || 1));
        const available = halfCasterProgression[charLevel];
        return spellLevels.filter(level => available[level] > 0);
      }
      return spellLevels;
    }

    function buildHealthPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';

      section.appendChild(createHealthCard('Current HP', 'current'));
      section.appendChild(createHealthCard('Max HP', 'max'));
      section.appendChild(createHealthCard('Temp HP', 'temp'));

      page.appendChild(section);
      return page;
    }

    function createHealthCard(labelText, key) {
      const card = document.createElement('div');
      card.className = 'card';
      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = labelText;
      let valueElement;
      if (key === 'max') {
        valueElement = document.createElement('input');
        valueElement.type = 'number';
        valueElement.className = 'card-input';
        valueElement.id = `healthInput-${key}`;
        valueElement.value = character.health[key];
        valueElement.addEventListener('input', () => {
          character.health[key] = Math.max(0, Number(valueElement.value) || 0);
          if (character.health.current > character.health.max) {
            character.health.current = character.health.max;
            const currentInput = document.getElementById('healthValue-current');
            if (currentInput) currentInput.textContent = character.health.current;
          }
          saveCharacter();
          renderHealth();
        });
      } else {
        valueElement = document.createElement('div');
        valueElement.className = 'card-value';
        valueElement.id = `healthValue-${key}`;
        valueElement.textContent = character.health[key];
      }
      card.append(title, valueElement);
      if (key !== 'max') {
        const buttonRow = document.createElement('div');
        buttonRow.className = 'button-row';
        ['-10', '-5', '-1', '+1', '+5', '+10'].forEach(label => {
          const button = document.createElement('div');
          button.className = 'pill';
          button.textContent = label;
          const delta = Number(label);
          button.addEventListener('click', () => adjustHealth(key, delta));
          buttonRow.appendChild(button);
        });
        card.appendChild(buttonRow);
      }
      return card;
    }

    function adjustHealth(key, delta) {
      const max = key === 'current' ? character.health.max : 999;
      character.health[key] = Math.max(0, Math.min(max, character.health[key] + delta));
      if (key === 'max' && character.health.current > character.health.max) {
        character.health.current = character.health.max;
      }
      renderHealth();
      saveCharacter();
    }

    function renderHealth() {
      ['current', 'temp'].forEach(key => {
        const value = document.getElementById(`healthValue-${key}`);
        if (value) value.textContent = character.health[key];
      });
      const maxInput = document.getElementById('healthInput-max');
      if (maxInput) maxInput.value = character.health.max;
    }

    function buildMoneyPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';
      moneyKeys.forEach(currency => {
        section.appendChild(createMoneyRow(currency));
      });
      page.appendChild(section);
      return page;
    }

    function createMoneyRow(currency) {
      const row = document.createElement('div');
      row.className = 'card';
      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = currencyLabels[currency] || currency;
      const input = document.createElement('input');
      input.type = 'number';
      input.className = 'card-input';
      input.id = `moneyInput-${currency}`;
      input.value = character.money[currency];
      input.addEventListener('input', () => {
        character.money[currency] = Math.max(0, Number(input.value) || 0);
        saveCharacter();
      });
      row.append(title, input);
      row.dataset.currency = currency;
      return row;
    }

    function adjustMoney(currency, delta) {
      character.money[currency] = Math.max(0, character.money[currency] + delta);
      renderMoney();
      saveCharacter();
    }

    function renderMoney() {
      moneyKeys.forEach(currency => {
        const input = document.getElementById(`moneyInput-${currency}`);
        if (input) input.value = character.money[currency];
      });
    }

    function buildSpellSlotsPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';
      const info = getSpellcastingInfo();

      const header = document.createElement('div');
      header.className = 'spell-header';
      const title = document.createElement('div');
      title.className = 'spell-title';
      title.textContent = 'Spell Slots';
      const subtitle = document.createElement('div');
      subtitle.className = 'spell-subtitle';
      subtitle.textContent = `Spellcasting: ${info.type} (${info.subclass})`;
      header.append(title, subtitle);

      const table = document.createElement('div');
      table.className = 'spell-table';
      table.appendChild(createSpellRowHeader());

      const visibleLevels = getVisibleSpellLevels();
      if (visibleLevels.length === 0) {
        const noSlots = document.createElement('div');
        noSlots.className = 'spell-no-slots';
        noSlots.textContent = 'No spell slots available at this character level.';
        table.appendChild(noSlots);
      } else {
        visibleLevels.forEach(level => {
          const row = createSpellSlotRow(level);
          table.appendChild(row);
        });
      }

      const actionRow = document.createElement('div');
      actionRow.className = 'spell-actions';
      const restoreButton = createButton('Restore All Slots', restoreAllSlots);
      const clearButton = createButton('Clear All', clearAllSlots);
      actionRow.append(restoreButton, clearButton);

      section.append(header, table, actionRow);
      page.appendChild(section);
      return page;
    }

    function createSpellRowHeader() {
      const header = document.createElement('div');
      header.className = 'spell-row header-row';
      const levelHeader = document.createElement('div');
      levelHeader.textContent = 'Spell Level';
      const maxHeader = document.createElement('div');
      maxHeader.textContent = 'Maximum Slots';
      const remainingHeader = document.createElement('div');
      remainingHeader.textContent = 'Remaining Slots';
      header.append(levelHeader, maxHeader, remainingHeader);
      return header;
    }

    function createSpellSlotRow(level) {
      const row = document.createElement('div');
      row.className = 'spell-row';
      const label = document.createElement('div');
      label.className = 'spell-level';
      const badge = document.createElement('div');
      badge.className = 'spell-badge';
      badge.textContent = level;
      const labelText = document.createElement('div');
      labelText.textContent = `Level ${level}`;
      label.append(badge, labelText);

      const totalBox = document.createElement('div');
      totalBox.className = 'spell-total';
      const maxInput = document.createElement('input');
      maxInput.type = 'number';
      maxInput.min = 0;
      maxInput.value = getSpellLevelSlots(level);
      maxInput.addEventListener('input', () => {
        const slot = getOrCreateSpellSlot(level);
        slot.max = Math.max(0, Number(maxInput.value) || 0);
        if (slot.used > slot.max) slot.used = slot.max;
        renderSpellSlots();
        saveCharacter();
      });
      totalBox.append(maxInput);

      const circles = document.createElement('div');
      circles.className = 'spell-circles';
      const slot = getOrCreateSpellSlot(level);
      slot.max = Number(maxInput.value);
      createSlotCircles(slot, circles);

      row.append(label, totalBox, circles);
      row.dataset.level = level;
      return row;
    }

    function getOrCreateSpellSlot(level) {
      let slot = character.spellSlots.find(s => s.level === level);
      if (!slot) {
        slot = { level, max: 0, used: 0 };
        character.spellSlots.push(slot);
      }
      return slot;
    }

    function createSlotCircles(slot, container) {
      container.innerHTML = '';
      for (let i = 0; i < slot.max; i += 1) {
        const circle = document.createElement('div');
        circle.className = 'slot-circle' + (i < slot.used ? ' used' : '');
        circle.textContent = i + 1;
        circle.addEventListener('click', () => {
          slot.used = i + 1 === slot.used ? i : i + 1;
          if (slot.used > slot.max) slot.used = slot.max;
          renderSpellSlots();
          saveCharacter();
        });
        container.appendChild(circle);
      }
    }

    function renderSpellSlots() {
      const rows = pagesContainer.querySelectorAll('.spell-row');
      rows.forEach(row => {
        const level = Number(row.dataset.level);
        const slot = character.spellSlots.find(s => s.level === level);
        if (!slot) return;
        const circles = row.querySelector('.spell-circles');
        if (circles) createSlotCircles(slot, circles);
        const input = row.querySelector('input[type="number"]');
        if (input) input.value = slot.max;
      });
    }

    function buildSettingsPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';
      const exportButton = createButton('Export Character', handleExport);
      const importButton = createButton('Import Character', handleImport);
      const clearButton = createButton('Clear Save', handleClearSave, 'destructive');
      const textareaWrap = document.createElement('div');
      textareaWrap.className = 'textarea-wrap';
      const textareaLabel = document.createElement('div');
      textareaLabel.className = 'help-text';
      textareaLabel.textContent = 'Paste JSON here for import, or copy exported JSON.';
      const textarea = document.createElement('textarea');
      textarea.id = 'jsonArea';
      textarea.placeholder = '{ "name": "..." }';
      textareaWrap.append(textareaLabel, textarea);
      section.append(exportButton, importButton, clearButton, textareaWrap);
      page.appendChild(section);
      return page;
    }

    function handleExport() {
      const jsonArea = document.getElementById('jsonArea');
      const exportText = JSON.stringify(character, null, 2);
      jsonArea.value = exportText;
      copyText(exportText);
      statusBar.textContent = 'Character JSON copied to clipboard and shown below.';
    }

    function handleImport() {
      const jsonArea = document.getElementById('jsonArea');
      try {
        const parsed = JSON.parse(jsonArea.value);
        character = mergeCharacter(characterTemplate, parsed);
        renderAll();
        saveCharacter();
        statusBar.textContent = 'Character imported successfully.';
      } catch (error) {
        statusBar.textContent = 'Invalid JSON import. Check your data.';
      }
    }

    function handleClearSave() {
      localStorage.removeItem(STORAGE_KEY);
      character = JSON.parse(JSON.stringify(characterTemplate));
      renderAll();
      saveCharacter();
      statusBar.textContent = 'Save cleared. Template restored.';
    }

    function copyText(text) {
      try {
        navigator.clipboard.writeText(text).catch(() => {});
      } catch (error) {
        console.warn('Clipboard not available.', error);
      }
    }

    function restoreAllSlots() {
      character.spellSlots.forEach(slot => {
        slot.used = 0;
      });
      renderSpellSlots();
      saveCharacter();
    }

    function clearAllSlots() {
      character.spellSlots.forEach(slot => {
        slot.max = 0;
        slot.used = 0;
      });
      renderSpellSlots();
      saveCharacter();
    }

    function refreshSpellSlotsPage() {
      const page = pagesContainer.children[4];
      if (!page) return;
      const section = page.querySelector('.section');
      if (!section) return;
      section.innerHTML = '';
      const info = getSpellcastingInfo();
      const header = document.createElement('div');
      header.className = 'spell-header';
      const title = document.createElement('div');
      title.className = 'spell-title';
      title.textContent = 'Spell Slots';
      const subtitle = document.createElement('div');
      subtitle.className = 'spell-subtitle';
      subtitle.textContent = `Spellcasting: ${info.type} (${info.subclass})`;
      header.append(title, subtitle);
      const table = document.createElement('div');
      table.className = 'spell-table';
      table.appendChild(createSpellRowHeader());
      const visibleLevels = getVisibleSpellLevels();
      if (visibleLevels.length === 0) {
        const noSlots = document.createElement('div');
        noSlots.className = 'spell-no-slots';
        noSlots.textContent = 'No spell slots available at this character level.';
        table.appendChild(noSlots);
      } else {
        visibleLevels.forEach(level => table.appendChild(createSpellSlotRow(level)));
      }
      const actionRow = document.createElement('div');
      actionRow.className = 'spell-actions';
      const restoreButton = createButton('Restore All Slots', restoreAllSlots);
      const clearButton = createButton('Clear All', clearAllSlots);
      actionRow.append(restoreButton, clearButton);
      section.append(header, table, actionRow);
      renderSpellSlots();
    }

    function renderAll() {
      pagesContainer.innerHTML = '';
      buildApp();
      renderStats();
      renderHealth();
      renderMoney();
      renderSpellSlots();
      const jsonArea = document.getElementById('jsonArea');
      if (jsonArea) jsonArea.value = '';
    }

    buildApp();
    saveCharacter();
  </script>
</body>
</html>
