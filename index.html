<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>InkSheet</title>
  <style>
    /* Core page styling */
    :root {
      color-scheme: dark;
      color: #000;
      background: #fff;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      color: #000;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      padding: 10px;
      gap: 8px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border: 2px solid #000;
      background: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      min-height: 48px;
    }
    header .logo {
      letter-spacing: 0.08em;
    }
    header .page-title {
      text-align: right;
      font-size: 0.95rem;
    }
    .page-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
    }
    .page-nav button {
      flex: 1 1 48%;
      min-height: 50px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      padding: 10px;
    }
    .page-nav button.active {
      background: #000;
      color: #fff;
    }
    .page {
      flex: 1;
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 10px 0;
      overflow: hidden;
    }
    .page.active {
      display: flex;
    }
    .section {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border: 2px solid #000;
      padding: 10px;
      background: #fff;
      flex: 1;
      min-height: 0;
    }
    .field-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    label {
      font-size: 0.9rem;
      font-weight: 700;
    }
    input[type="text"], input[type="number"], textarea {
      width: 100%;
      border: 2px solid #000;
      padding: 10px;
      font-size: 1rem;
      background: #fff;
      color: #000;
    }
    input[type="number"] {
      max-width: 100%;
    }
    .large-button {
      width: 100%;
      min-height: 48px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      padding: 12px;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    .control-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
    }
    .control-group label {
      flex: 1;
    }
    .stat-row, .money-row, .hp-row {
      display: grid;
      grid-template-columns: 1fr repeat(5, auto);
      gap: 4px;
      align-items: center;
      width: 100%;
    }
    .stat-name {
      font-weight: 700;
    }
    .stat-value,
    .money-value,
    .hp-value {
      width: 58px;
      text-align: center;
      font-size: 1rem;
      border: 2px solid #000;
      padding: 10px 6px;
      background: #fff;
    }
    .pill {
      width: 48px;
      min-height: 48px;
      border: 2px solid #000;
      background: #fff;
      font-size: 1.25rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    .modifier {
      width: 62px;
      text-align: center;
      border: 2px solid #000;
      padding: 10px 8px;
      font-size: 1rem;
      font-weight: 700;
      background: #fff;
    }
    .hp-display {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .hp-box {
      flex: 1;
      min-width: 150px;
      border: 2px solid #000;
      padding: 12px;
      text-align: center;
      background: #fff;
      font-size: 1rem;
      font-weight: 700;
    }
    .slot-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      width: 100%;
    }
    .slot-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }
    .slot-circles {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }
    .slot-circle {
      width: 24px;
      height: 24px;
      border: 2px solid #000;
      border-radius: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: #fff;
      font-size: 0.9rem;
      user-select: none;
    }
    .slot-circle.used {
      background: #000;
      color: #fff;
    }
    .footer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .help-text {
      font-size: 0.85rem;
      color: #000;
      line-height: 1.3;
    }
    .textarea-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    textarea {
      min-height: 150px;
      resize: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
    }
    .status-bar {
      font-size: 0.85rem;
      text-align: center;
      min-height: 24px;
      line-height: 24px;
      color: #000;
    }
    @media (max-width: 480px) {
      .page-nav button {
        flex: 1 1 100%;
      }
      .field-group {
        grid-template-columns: 1fr;
      }
      .stat-row, .money-row, .hp-row, .slot-row {
        grid-template-columns: 1fr;
      }
      .slot-controls {
        justify-content: space-between;
      }
      .slot-circles {
        justify-content: flex-start;
      }
      .control-group {
        flex-direction: column;
        align-items: stretch;
      }
      .hp-box {
        min-width: 100%;
      }
      .pill {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="logo">InkSheet</div>
      <div class="page-title" id="headerTitle">Character</div>
    </header>

    <nav class="page-nav" id="navButtons"></nav>

    <main class="page-container" id="pages"></main>

    <div class="status-bar" id="statusBar">Autosave enabled. Load or edit values to save automatically.</div>
  </div>

  <script>
    // Data model for the character tracker
    const STORAGE_KEY = 'inkSheetCharacter';
    const pages = ['Character', 'Stats', 'Health', 'Money', 'Spell Slots', 'Settings'];
    const currencyLabels = {
      PP: 'Platinum Coins',
      GP: 'Gold Coins',
      EP: 'Electrum Coins',
      SP: 'Silver Coins',
      CP: 'Copper Coins',
    };

    const characterTemplate = {
      name: '',
      race: '',
      class: '',
      level: 1,
      stats: {
        STR: 10,
        DEX: 10,
        CON: 10,
        INT: 10,
        WIS: 10,
        CHA: 10,
      },
      health: {
        current: 10,
        max: 10,
        temp: 0,
      },
      money: {
        PP: 0,
        GP: 0,
        EP: 0,
        SP: 0,
        CP: 0,
      },
      spellSlots: Array.from({ length: 9 }, (_, index) => ({
        level: index + 1,
        max: 0,
        used: 0,
      })),
    };

    let character = loadCharacter();
    let currentPage = 0;

    const navButtons = document.getElementById('navButtons');
    const pagesContainer = document.getElementById('pages');
    const headerTitle = document.getElementById('headerTitle');
    const statusBar = document.getElementById('statusBar');

    function saveCharacter() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(character));
      statusBar.textContent = 'Saved at ' + new Date().toLocaleTimeString();
    }

    function loadCharacter() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          const parsed = JSON.parse(stored);
          return mergeCharacter(characterTemplate, parsed);
        }
      } catch (error) {
        console.error('Unable to load character', error);
      }
      return JSON.parse(JSON.stringify(characterTemplate));
    }

    function mergeCharacter(template, data) {
      const merged = JSON.parse(JSON.stringify(template));
      for (const key in data) {
        if (data[key] === null || data[key] === undefined) continue;
        if (typeof data[key] === 'object' && !Array.isArray(data[key])) {
          merged[key] = mergeCharacter(merged[key], data[key]);
        } else if (Array.isArray(data[key]) && Array.isArray(merged[key])) {
          merged[key] = data[key].map((item, idx) => mergeCharacter(merged[key][idx] || {}, item));
        } else {
          merged[key] = data[key];
        }
      }
      return merged;
    }

    function createButton(text, handler, extraClass = '') {
      const button = document.createElement('button');
      button.type = 'button';
      button.textContent = text;
      button.className = 'large-button ' + extraClass;
      button.addEventListener('click', handler);
      return button;
    }

    function createPageNavigation() {
      pages.forEach((pageName, index) => {
        const button = createButton(pageName, () => switchPage(index));
        if (index === currentPage) button.classList.add('active');
        navButtons.appendChild(button);
      });
    }

    function switchPage(index) {
      currentPage = index;
      headerTitle.textContent = pages[index];
      Array.from(navButtons.children).forEach((btn, idx) => {
        btn.classList.toggle('active', idx === index);
      });
      Array.from(pagesContainer.children).forEach((page, idx) => {
        page.classList.toggle('active', idx === index);
      });
      statusBar.textContent = 'Viewing ' + pages[index] + ' page. Changes save automatically.';
    }

    function buildApp() {
      createPageNavigation();
      pagesContainer.appendChild(buildCharacterPage());
      pagesContainer.appendChild(buildStatsPage());
      pagesContainer.appendChild(buildHealthPage());
      pagesContainer.appendChild(buildMoneyPage());
      pagesContainer.appendChild(buildSpellSlotsPage());
      pagesContainer.appendChild(buildSettingsPage());
      switchPage(currentPage);
    }

    function buildCharacterPage() {
      const page = document.createElement('section');
      page.className = 'page';
      page.innerHTML = '<div class="section"></div>';
      const section = page.firstElementChild;
      section.appendChild(createField('Name', 'name', 'text', character.name));
      section.appendChild(createField('Race', 'race', 'text', character.race));
      section.appendChild(createField('Class', 'class', 'text', character.class));
      section.appendChild(createField('Level', 'level', 'number', character.level, { min: 1, max: 20 }));
      return page;
    }

    function createField(labelText, key, type, value, attrs = {}) {
      const wrapper = document.createElement('div');
      wrapper.className = 'field';
      const label = document.createElement('label');
      label.textContent = labelText;
      const input = document.createElement('input');
      input.type = type;
      input.value = value;
      Object.entries(attrs).forEach(([attr, val]) => input.setAttribute(attr, val));
      input.addEventListener('input', () => {
        if (type === 'number') {
          character[key] = Number(input.value) || 0;
        } else {
          character[key] = input.value;
        }
        saveCharacter();
      });
      wrapper.appendChild(label);
      wrapper.appendChild(input);
      return wrapper;
    }

    function buildStatsPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';
      const statNames = Object.keys(character.stats);
      statNames.forEach(stat => {
        section.appendChild(createStatRow(stat));
      });
      page.appendChild(section);
      return page;
    }

    function createStatRow(stat) {
      const row = document.createElement('div');
      row.className = 'stat-row';
      const label = document.createElement('div');
      label.className = 'stat-name';
      label.textContent = stat;
      const minus = document.createElement('div');
      minus.className = 'pill';
      minus.textContent = '-';
      minus.addEventListener('click', () => adjustStat(stat, -1));
      const value = document.createElement('div');
      value.className = 'stat-value';
      value.textContent = character.stats[stat];
      const plus = document.createElement('div');
      plus.className = 'pill';
      plus.textContent = '+';
      plus.addEventListener('click', () => adjustStat(stat, 1));
      const modifier = document.createElement('div');
      modifier.className = 'modifier';
      modifier.textContent = formatModifier(calcModifier(character.stats[stat]));
      row.append(label, minus, value, plus, modifier);
      row.dataset.stat = stat;
      return row;
    }

    function adjustStat(stat, delta) {
      character.stats[stat] = Math.max(1, character.stats[stat] + delta);
      renderStats();
      saveCharacter();
    }

    function renderStats() {
      const rows = pagesContainer.querySelectorAll('.stat-row');
      rows.forEach(row => {
        const stat = row.dataset.stat;
        row.querySelector('.stat-value').textContent = character.stats[stat];
        row.querySelector('.modifier').textContent = formatModifier(calcModifier(character.stats[stat]));
      });
    }

    function calcModifier(value) {
      return Math.floor((value - 10) / 2);
    }

    function formatModifier(value) {
      return (value >= 0 ? '+' : '') + value;
    }

    function buildHealthPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';

      const currentRow = createHpRow('Current HP', 'current', 0, 999);
      const maxRow = createHpRow('Max HP', 'max', 0, 999);
      const tempRow = createHpRow('Temp HP', 'temp', 0, 999);

      section.append(currentRow, maxRow, tempRow);
      const display = document.createElement('div');
      display.className = 'hp-display';
      const currentBox = document.createElement('div');
      currentBox.className = 'hp-box';
      currentBox.id = 'hpDisplayValue';
      const updateHpDisplay = () => {
        currentBox.textContent = `HP: ${character.health.current} / ${character.health.max}`;
      };
      updateHpDisplay();
      section.appendChild(display);
      display.appendChild(currentBox);
      page.appendChild(section);
      return page;
    }

    function createHpRow(labelText, key, min, max) {
      const row = document.createElement('div');
      row.className = 'hp-row';
      const label = document.createElement('div');
      label.className = 'stat-name';
      label.textContent = labelText;
      const minus10 = document.createElement('div');
      minus10.className = 'pill';
      minus10.textContent = '-10';
      const minus5 = document.createElement('div');
      minus5.className = 'pill';
      minus5.textContent = '-5';
      const value = document.createElement('div');
      value.className = 'stat-value';
      value.textContent = character.health[key];
      const plus5 = document.createElement('div');
      plus5.className = 'pill';
      plus5.textContent = '+5';
      const plus10 = document.createElement('div');
      plus10.className = 'pill';
      plus10.textContent = '+10';
      minus10.addEventListener('click', () => adjustHealth(key, -10));
      minus5.addEventListener('click', () => adjustHealth(key, -5));
      plus5.addEventListener('click', () => adjustHealth(key, 5));
      plus10.addEventListener('click', () => adjustHealth(key, 10));
      row.append(label, minus10, minus5, value, plus5, plus10);
      row.dataset.key = key;
      return row;
    }

    function adjustHealth(key, delta) {
      const max = key === 'current' ? character.health.max : 999;
      character.health[key] = Math.max(0, Math.min(max, character.health[key] + delta));
      if (key === 'max' && character.health.current > character.health.max) {
        character.health.current = character.health.max;
      }
      renderHealth();
      saveCharacter();
    }

    function renderHealth() {
      const rows = pagesContainer.querySelectorAll('.hp-row');
      rows.forEach(row => {
        const key = row.dataset.key;
        row.querySelector('.stat-value').textContent = character.health[key];
      });
      const display = document.getElementById('hpDisplayValue');
      if (display) {
        display.textContent = `HP: ${character.health.current} / ${character.health.max}`;
      }
    }

    function buildMoneyPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';
      Object.keys(character.money).forEach(currency => {
        section.appendChild(createMoneyRow(currency));
      });
      page.appendChild(section);
      return page;
    }

    function createMoneyRow(currency) {
      const row = document.createElement('div');
      row.className = 'money-row';
      const label = document.createElement('div');
      label.className = 'stat-name';
      label.textContent = currencyLabels[currency] || currency;
      const minus100 = document.createElement('div');
      minus100.className = 'pill';
      minus100.textContent = '-100';
      const minus = document.createElement('div');
      minus.className = 'pill';
      minus.textContent = '-';
      const value = document.createElement('div');
      value.className = 'money-value';
      value.textContent = character.money[currency];
      const plus = document.createElement('div');
      plus.className = 'pill';
      plus.textContent = '+';
      const plus100 = document.createElement('div');
      plus100.className = 'pill';
      plus100.textContent = '+100';
      minus100.addEventListener('click', () => adjustMoney(currency, -100));
      minus.addEventListener('click', () => adjustMoney(currency, -1));
      plus.addEventListener('click', () => adjustMoney(currency, 1));
      plus100.addEventListener('click', () => adjustMoney(currency, 100));
      row.append(label, minus100, minus, value, plus, plus100);
      row.dataset.currency = currency;
      return row;
    }

    function adjustMoney(currency, delta) {
      character.money[currency] = Math.max(0, character.money[currency] + delta);
      renderMoney();
      saveCharacter();
    }

    function renderMoney() {
      const rows = pagesContainer.querySelectorAll('.money-row');
      rows.forEach(row => {
        const currency = row.dataset.currency;
        row.querySelector('.money-value').textContent = character.money[currency];
      });
    }

    function buildSpellSlotsPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';
      character.spellSlots.forEach(slot => {
        section.appendChild(createSpellSlotRow(slot));
      });
      page.appendChild(section);
      return page;
    }

    function createSpellSlotRow(slot) {
      const row = document.createElement('div');
      row.className = 'slot-row';
      const label = document.createElement('div');
      label.className = 'stat-name';
      label.textContent = `Level ${slot.level}`;
      const controls = document.createElement('div');
      controls.className = 'slot-controls';
      const maxInput = document.createElement('input');
      maxInput.type = 'number';
      maxInput.min = 0;
      maxInput.value = slot.max;
      maxInput.style.width = '80px';
      maxInput.addEventListener('input', () => {
        slot.max = Math.max(0, Number(maxInput.value) || 0);
        if (slot.used > slot.max) slot.used = slot.max;
        renderSpellSlots();
        saveCharacter();
      });
      const circles = document.createElement('div');
      circles.className = 'slot-circles';
      createSlotCircles(slot, circles);
      controls.append(maxInput, circles);
      row.append(label, controls);
      row.dataset.level = slot.level;
      return row;
    }

    function createSlotCircles(slot, container) {
      container.innerHTML = '';
      for (let i = 0; i < Math.max(1, slot.max); i += 1) {
        const circle = document.createElement('div');
        circle.className = 'slot-circle' + (i < slot.used ? ' used' : '');
        circle.textContent = i + 1;
        circle.addEventListener('click', () => {
          slot.used = i + 1 === slot.used ? i : i + 1;
          if (slot.used > slot.max) slot.used = slot.max;
          renderSpellSlots();
          saveCharacter();
        });
        container.appendChild(circle);
      }
    }

    function renderSpellSlots() {
      const rows = pagesContainer.querySelectorAll('.slot-row');
      rows.forEach(row => {
        const level = Number(row.dataset.level);
        const slot = character.spellSlots.find(s => s.level === level);
        const circles = row.querySelector('.slot-circles');
        if (slot && circles) createSlotCircles(slot, circles);
        const input = row.querySelector('input[type="number"]');
        if (input) input.value = slot.max;
      });
    }

    function buildSettingsPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';
      const exportButton = createButton('Export Character', handleExport);
      const importButton = createButton('Import Character', handleImport);
      const clearButton = createButton('Clear Save', handleClearSave, 'destructive');
      const textareaWrap = document.createElement('div');
      textareaWrap.className = 'textarea-wrap';
      const textareaLabel = document.createElement('div');
      textareaLabel.className = 'help-text';
      textareaLabel.textContent = 'Paste JSON here for import, or copy exported JSON.';
      const textarea = document.createElement('textarea');
      textarea.id = 'jsonArea';
      textarea.placeholder = '{ "name": "..." }';
      textareaWrap.append(textareaLabel, textarea);
      section.append(exportButton, importButton, clearButton, textareaWrap);
      page.appendChild(section);
      return page;
    }

    function handleExport() {
      const jsonArea = document.getElementById('jsonArea');
      const exportText = JSON.stringify(character, null, 2);
      jsonArea.value = exportText;
      copyText(exportText);
      statusBar.textContent = 'Character JSON copied to clipboard and shown below.';
    }

    function handleImport() {
      const jsonArea = document.getElementById('jsonArea');
      try {
        const parsed = JSON.parse(jsonArea.value);
        character = mergeCharacter(characterTemplate, parsed);
        renderAll();
        saveCharacter();
        statusBar.textContent = 'Character imported successfully.';
      } catch (error) {
        statusBar.textContent = 'Invalid JSON import. Check your data.';
      }
    }

    function handleClearSave() {
      localStorage.removeItem(STORAGE_KEY);
      character = JSON.parse(JSON.stringify(characterTemplate));
      renderAll();
      saveCharacter();
      statusBar.textContent = 'Save cleared. Template restored.';
    }

    function copyText(text) {
      try {
        navigator.clipboard.writeText(text).catch(() => {});
      } catch (error) {
        console.warn('Clipboard not available.', error);
      }
    }

    function renderAll() {
      pagesContainer.innerHTML = '';
      buildApp();
      renderStats();
      renderHealth();
      renderMoney();
      renderSpellSlots();
      const jsonArea = document.getElementById('jsonArea');
      if (jsonArea) jsonArea.value = '';
    }

    buildApp();
    saveCharacter();
  </script>
</body>
</html>
