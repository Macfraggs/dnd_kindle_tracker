<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kindle Character Companion v0.1</title>
<style>
body{font-family:Arial,sans-serif;max-width:720px;margin:auto;padding:16px;background:#fff;color:#000}
.page{display:none}
.page.active{display:block}
input{width:100%;font-size:20px;margin:6px 0;padding:8px;box-sizing:border-box}
button{font-size:20px;padding:10px 18px;margin:6px}
.nav{display:flex;justify-content:space-between;align-items:center;border-top:2px solid #000;padding-top:12px;margin-top:20px}
h1,h2{text-align:center}
</style>
</head>
<body>
<h1>Kindle Character Companion v0.1</h1>

<div id="p0" class="page active">
<h2>Character</h2>
<input id="name" placeholder="Character Name">
<input id="race" placeholder="Race">
<input id="cls" placeholder="Class">
<input id="sub" placeholder="Subclass">
<input id="lvl" type="number" placeholder="Level">
</div>

<div id="p1" class="page"><h2>Stats</h2><p>Coming in v0.2</p></div>
<div id="p2" class="page"><h2>Health</h2><p>Coming in v0.3</p></div>
<div id="p3" class="page"><h2>Coins</h2><p>Coming in v0.4</p></div>
<div id="p4" class="page"><h2>Spell Slots</h2><p>Coming in v0.5</p></div>
<div id="p5" class="page">
<h2>Settings</h2>
<button onclick="exportChar()">Export Character</button><br>
<input type="file" id="imp">
</div>

<div class="nav">
<button onclick="prev()">◀ Prev</button>
<div id="title">Character (1/6)</div>
<button onclick="next()">Next ▶</button>
</div>

<script>
let page=0;
const titles=["Character","Stats","Health","Coins","Spell Slots","Settings"];
let data=JSON.parse(localStorage.getItem("kcc")||'{"name":"","race":"","class":"","subclass":"","level":1}');
function show(){
document.querySelectorAll(".page").forEach((p,i)=>p.classList.toggle("active",i===page));
title.textContent=titles[page]+" ("+(page+1)+"/6)";
}
function next(){page=(page+1)%6;show();}
function prev(){page=(page+5)%6;show();}
function save(){
data.name=name.value;data.race=race.value;data.class=cls.value;data.subclass=sub.value;data.level=+lvl.value||1;
localStorage.setItem("kcc",JSON.stringify(data));
}
function load(){
name.value=data.name||"";race.value=data.race||"";cls.value=data.class||"";sub.value=data.subclass||"";lvl.value=data.level||1;
}
[name,race,cls,sub,lvl].forEach(e=>e.oninput=save);
function exportChar(){
const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download=(data.name||"character")+".json";
a.click();
}
imp.onchange=e=>{
const f=e.target.files[0]; if(!f)return;
const r=new FileReader();
r.onload=()=>{data=JSON.parse(r.result);load();save();alert("Imported!");};
r.readAsText(f);
};
load();show();
</script>
</body>
</html>
