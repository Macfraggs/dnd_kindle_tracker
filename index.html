<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>InkSheet</title>
  <style>
    /* Core page styling */
    :root {
      color-scheme: dark;
      color: #000;
      background: #fff;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      color: #000;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: min(100%, 760px);
      max-width: 760px;
      margin: 0 auto;
      width: 100vw;
      max-width: 100vw;
      margin: 0;
      padding: 10px;
      gap: 8px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border: 2px solid #000;
      background: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      min-height: 48px;
    }
    header .logo {
      letter-spacing: 0.08em;
    }
    header .page-title {
      text-align: right;
      font-size: 0.95rem;
    }
    .page-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .page-nav button {
      flex: 1 1 31%;
      max-width: 220px;
      min-height: 44px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      padding: 10px 8px;
    }
    .page-nav button.active {
      background: #000;
      color: #fff;
    }
    .page-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .page {
      flex: 1;
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 10px 0;
      overflow: hidden;
      min-height: 0;
    }
    .page.active {
      display: flex;
    }
    .section {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border: 2px solid #000;
      padding: 10px;
      background: #fff;
      flex: 1;
      min-height: 0;
    }
    .field-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    label {
      font-size: 0.9rem;
      font-weight: 700;
    }
    input[type="text"], input[type="number"], textarea {
      width: 100%;
      border: 2px solid #000;
      padding: 10px;
      font-size: 1rem;
      background: #fff;
      color: #000;
    }
    input[type="number"] {
      max-width: 100%;
    }
    .large-button {
      width: 100%;
      min-height: 48px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      padding: 12px;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    .control-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
    }
    .control-group label {
      flex: 1;
    }
    .stat-row, .money-row, .hp-row {
      display: grid;
      grid-template-columns: 1fr repeat(5, auto);
      gap: 4px;
      align-items: center;
      width: 100%;
    }
    .stats-page {
      overflow: hidden;
    }
    .stats-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
      min-height: 100%;
      position: relative;
      flex: 1;
      width: 100%;
    }
    .stats-card {
      border: 2px solid #000;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #fff;
    }
    .stats-card-title {
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .stats-proficiency-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .stats-toggle-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stats-toggle-btn {
      min-height: 44px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-weight: 700;
      cursor: pointer;
      padding: 8px;
    }
    .stats-toggle-btn.active {
      background: #000;
      color: #fff;
    }
    .stats-input {
      width: 100%;
      min-height: 44px;
      border: 2px solid #000;
      padding: 8px 10px;
      font-size: 1rem;
      font-weight: 700;
      background: #fff;
      color: #000;
      text-align: center;
    }
    .ability-row {
      display: grid;
      grid-template-columns: 42px 58px 42px auto auto;
      gap: 6px;
      align-items: center;
      min-height: 38px;
    }
    .ability-name {
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
    }
    .stats-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      border: 2px solid #000;
      padding: 0 6px;
      font-weight: 700;
      font-size: 0.9rem;
      background: #fff;
      color: #000;
      white-space: nowrap;
    }
    .stats-badge.secondary {
      font-size: 0.9rem;
    }
    .other-stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .other-stats-item {
      border: 2px solid #000;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      background: #fff;
      min-height: 52px;
    }
    .other-stats-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .other-stats-value {
      font-size: 0.95rem;
      font-weight: 700;
      word-break: break-word;
    }
    .checkbox-wrap {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap;
      justify-content: flex-end;
    }
    .checkbox-wrap input {
      width: 20px;
      height: 20px;
      accent-color: #000;
      margin: 0;
    }
    .ability-skill-btn {
      min-height: 38px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      padding: 6px 8px;
      white-space: nowrap;
    }
    .skill-subpage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      border: 2px solid #000;
      padding: 10px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 5;
      overflow: hidden;
      box-sizing: border-box;
    }
    .skill-subpage.active {
      display: flex;
    }
    .skill-subpage-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 700;
      min-height: 40px;
    }
    .skill-subpage-title {
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .skill-subpage-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      padding-right: 2px;
    }
    .skill-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 90px;
      padding: 12px 14px;
      border: 2px solid #000;
      background: #fff;
      box-sizing: border-box;
    }
    .skill-card-content {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .skill-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .skill-name {
      font-weight: 800;
      font-size: 0.98rem;
      line-height: 1.2;
    }
    .skill-ability {
      font-size: 0.8rem;
      color: #000;
      font-weight: 600;
    }
    .skill-bonus {
      min-width: 64px;
      width: 64px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 800;
      font-size: 1.1rem;
      border: 2px solid #000;
      background: #fff;
      align-self: center;
    }
    .skill-state-button {
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      padding: 10px 10px;
      min-height: 48px;
      min-width: 100px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      align-self: center;
    }
    .passive-card {
      border: 2px solid #000;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #fff;
      margin-top: 8px;
    }
    .passive-card-title {
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .passive-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      min-height: 34px;
    }
    .passive-value {
      border: 2px solid #000;
      padding: 8px 10px;
      min-width: 56px;
      text-align: center;
      background: #fff;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 2px solid #000;
      padding: 12px;
      background: #fff;
      width: 100%;
    }
    .card-title {
      font-weight: 700;
      text-align: center;
      font-size: 1rem;
    }
    .card-value {
      text-align: center;
      font-size: 2rem;
      font-weight: 900;
      border: 2px solid #000;
      padding: 16px 12px;
      background: #fff;
    }
    .card-input {
      width: 100%;
      border: 2px solid #000;
      padding: 14px 10px;
      font-size: 1.6rem;
      font-weight: 900;
      text-align: center;
      background: #fff;
      color: #000;
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .card-small-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      width: 100%;
    }
    .spell-circles {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-start;
      padding-top: 4px;
    }
    .combat-counters-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 8px;
    }
    .combat-counters-buttons button {
      width: 100%;
      min-height: 48px;
      align-self: stretch;
    }
    .combat-counters-totals {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    .counter-total-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 2px solid #000;
      background: #fff;
      padding: 12px;
      min-height: 90px;
      justify-content: space-between;
    }
    .counter-total-row > div {
      width: 100%;
    }
    .counter-reset-button {
      width: 100%;
      min-height: 44px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-weight: 700;
      padding: 10px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    @media (max-width: 600px) {
      .combat-counters-buttons,
      .combat-counters-totals {
        grid-template-columns: 1fr;
      }
    }
    .stat-name {
      font-weight: 700;
    }
    .stat-value,
    .money-value,
    .hp-value {
      width: 58px;
      text-align: center;
      font-size: 1rem;
      border: 2px solid #000;
      padding: 10px 6px;
      background: #fff;
    }
    .pill {
      width: 48px;
      min-height: 48px;
      border: 2px solid #000;
      background: #fff;
      font-size: 1.25rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      padding: 0 2px;
    }
    .modifier {
      width: 62px;
      text-align: center;
      border: 2px solid #000;
      padding: 10px 8px;
      font-size: 1rem;
      font-weight: 700;
      background: #fff;
    }
    .hp-display {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .hp-box {
      flex: 1;
      min-width: 150px;
      border: 2px solid #000;
      padding: 12px;
      text-align: center;
      background: #fff;
      font-size: 1rem;
      font-weight: 700;
    }
    .slot-row {
      display: grid;
      grid-template-columns: auto 1fr 1.5fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      padding: 10px 0;
      border-bottom: 1px solid #000;
    }
    .spell-table {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .spell-row {
      display: grid;
      grid-template-columns: auto 1fr 1.5fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      padding: 10px 0;
      border-bottom: 1px solid #000;
    }
    .spell-level {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      white-space: nowrap;
    }
    .spell-badge {
      width: 28px;
      height: 28px;
      border: 2px solid #000;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .spell-total {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .spell-total input {
      width: 100%;
      max-width: 100px;
      margin-top: 4px;
      text-align: center;
    }
    .spell-circles {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-start;
    }
    .slot-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }
    .slot-circles {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }
    .slot-circle {
      width: 60px;
      height: 60px;
      border: 2px solid #000;
      border-radius: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: #fff;
      font-size: 1rem;
      font-weight: 700;
      user-select: none;
    }
    .slot-circle.used {
      background: #000;
      color: #fff;
    }
    .footer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .help-text {
      font-size: 0.85rem;
      color: #000;
      line-height: 1.3;
    }
    .textarea-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    textarea {
      min-height: 150px;
      resize: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
    }
    .status-bar {
      font-size: 0.85rem;
      text-align: center;
      min-height: 24px;
      line-height: 24px;
      color: #000;
    }
    @media (max-width: 480px) {
      .page-nav button {
        flex: 1 1 100%;
      }
      .field-group {
        grid-template-columns: 1fr;
      }
      .stat-row, .money-row, .hp-row, .slot-row {
        grid-template-columns: 1fr;
      }
      .slot-controls {
        justify-content: space-between;
      }
      .slot-circles {
        justify-content: flex-start;
      }
      .control-group {
        flex-direction: column;
        align-items: stretch;
      }
      .hp-box {
        min-width: 100%;
      }
      .pill {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="logo">InkSheet</div>
      <div class="page-title" id="headerTitle">Charakter</div>
    </header>

    <nav class="page-nav" id="navButtons"></nav>

    <main class="page-container" id="pages"></main>

    <div class="status-bar" id="statusBar">Autospeichern aktiviert. Werte werden automatisch gespeichert.</div>
  </div>

  <script>
    // Data model for the character tracker
    const STORAGE_KEY = 'inkSheetCharacter';
    const pages = ['Charakter', 'Werte', 'Gesundheit', 'Geld', 'Zauberplätze', 'Kampfzähler', 'Einstellungen'];
    const currencyLabels = {
      PP: 'Platinmünzen',
      GP: 'Goldmünzen',
      SP: 'Silbermünzen',
      CP: 'Kupfermünzen',
    };
    const moneyKeys = ['PP', 'GP', 'SP', 'CP'];
    const spellLevels = [1, 2, 3, 4, 5];
    const abilityNames = ['STR', 'DEX', 'CON', 'INT', 'WIS', 'CHA'];
    const skillDefinitions = [
      { name: 'Akrobatik', ability: 'DEX' },

      { name: 'Mit Tieren umg.', ability: 'WIS' },

      { name: 'Arcane Kunde', ability: 'INT' },

      { name: 'Athletik', ability: 'STR' },

      { name: 'Täuschen', ability: 'CHA' },

      { name: 'Geschichte', ability: 'INT' },

      { name: 'Motiv Erkennen', ability: 'WIS' },

      { name: 'Einschüchtern', ability: 'CHA' },

      { name: 'Nachforschungen', ability: 'INT' },

      { name: 'Heilkunde', ability: 'WIS' },

      { name: 'Naturkunde', ability: 'INT' },

      { name: 'Wahrnehmung', ability: 'WIS' },

      { name: 'Auftreten', ability: 'CHA' },

      { name: 'Überzeugen', ability: 'CHA' },

      { name: 'Religion', ability: 'INT' },

      { name: 'Fingerfertigkeit', ability: 'DEX' },

      { name: 'Heimlichkeit', ability: 'DEX' },

      { name: 'Überlebenskunst', ability: 'WIS' },
    ];
    const halfCasterClasses = ['artificer', 'paladin', 'ranger'];
    const halfCasterProgression = {
      1: {},
      2: {1: 2},
      3: {1: 3, 2: 2},
      4: {1: 3, 2: 2},
      5: {1: 4, 2: 2},
      6: {1: 4, 2: 2},
      7: {1: 4, 2: 3},
      8: {1: 4, 2: 3},
      9: {1: 4, 2: 3, 3: 2},
      10: {1: 4, 2: 3, 3: 2},
      11: {1: 4, 2: 3, 3: 2},
      12: {1: 4, 2: 3, 3: 2},
      13: {1: 4, 2: 3, 3: 2},
      14: {1: 4, 2: 3, 3: 2},
      15: {1: 4, 2: 3, 3: 2},
      16: {1: 4, 2: 3, 3: 2, 4: 1},
      17: {1: 4, 2: 3, 3: 2, 4: 1},
      18: {1: 4, 2: 3, 3: 2, 4: 1},
      19: {1: 4, 2: 3, 3: 2, 4: 1},
      20: {1: 4, 2: 3, 3: 2, 4: 1, 5: 1},
    };

    const characterTemplate = {
      name: '',
      race: '',
      class: '',
      level: 1,
      stats: {
        STR: 10,
        DEX: 10,
        CON: 10,
        INT: 10,
        WIS: 10,
        CHA: 10,
      },
      proficiencyBonus: 2,
      savingThrows: Object.fromEntries(abilityNames.map(ability => [ability, false])),
      skills: Object.fromEntries(skillDefinitions.map(skill => [skill.name, {
        ability: skill.ability,
        proficient: false,
        expertise: false,
      }])),
      health: {
        current: 10,
        max: 10,
        temp: 0,
      },
      money: {
        PP: 0,
        GP: 0,
        SP: 0,
        CP: 0,
      },
      spellSlots: Array.from({ length: 9 }, (_, index) => ({
        level: index + 1,
        max: 0,
        used: 0,
      })),
      combatCounters: {
        damageTaken: 0,
        damageDealt: 0,
        healingGiven: 0,
        temporaryHP: 0,
      },
    };

    let character = loadCharacter();
    let currentPage = 0;

    const navButtons = document.getElementById('navButtons');
    const pagesContainer = document.getElementById('pages');
    const headerTitle = document.getElementById('headerTitle');
    const statusBar = document.getElementById('statusBar');

    function saveCharacter() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(character));
      statusBar.textContent = 'Gespeichert um ' + new Date().toLocaleTimeString();
    }

    function loadCharacter() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          const parsed = JSON.parse(stored);
          return mergeCharacter(characterTemplate, parsed);
        }
      } catch (error) {
        console.error('Unable to load character', error);
      }
      return JSON.parse(JSON.stringify(characterTemplate));
    }

    function mergeCharacter(template, data) {
      const merged = JSON.parse(JSON.stringify(template));
      for (const key in data) {
        if (data[key] === null || data[key] === undefined) continue;
        if (typeof data[key] === 'object' && !Array.isArray(data[key])) {
          merged[key] = mergeCharacter(merged[key], data[key]);
        } else if (Array.isArray(data[key]) && Array.isArray(merged[key])) {
          merged[key] = data[key].map((item, idx) => mergeCharacter(merged[key][idx] || {}, item));
        } else {
          merged[key] = data[key];
        }
      }
      return merged;
    }

    function createButton(text, handler, extraClass = '') {
      const button = document.createElement('button');
      button.type = 'button';
      button.textContent = text;
      button.className = 'large-button ' + extraClass;
      button.addEventListener('click', handler);
      return button;
    }

    function createPageNavigation() {
      pages.forEach((pageName, index) => {
        if (pageName === 'Combat Counters' || pageName === 'Kampfzähler') return;
        const button = createButton(pageName, () => switchPage(index));
        if (index === currentPage) button.classList.add('active');
        navButtons.appendChild(button);
      });
    }

    function switchPage(index) {
      currentPage = index;
      headerTitle.textContent = pages[index];
      Array.from(navButtons.children).forEach((btn, idx) => {
        btn.classList.toggle('active', idx === index);
      });
      Array.from(pagesContainer.children).forEach((page, idx) => {
        page.classList.toggle('active', idx === index);
      });
      statusBar.textContent = 'Ansicht: ' + pages[index] + '. Änderungen werden automatisch gespeichert.';
    }

    function buildApp() {
      createPageNavigation();
      pagesContainer.appendChild(buildCharacterPage());
      pagesContainer.appendChild(buildStatsPage());
      pagesContainer.appendChild(buildHealthPage());
      pagesContainer.appendChild(buildMoneyPage());
      pagesContainer.appendChild(buildSpellSlotsPage());
      pagesContainer.appendChild(buildCombatCountersPage());
      pagesContainer.appendChild(buildSettingsPage());
      switchPage(currentPage);
    }

    function buildCharacterPage() {
      const page = document.createElement('section');
      page.className = 'page';
      page.innerHTML = '<div class="section"></div>';
      const section = page.firstElementChild;
      section.appendChild(createField('Name', 'name', 'text', character.name));
      section.appendChild(createField('Rasse', 'race', 'text', character.race));
      section.appendChild(createField('Klasse', 'class', 'text', character.class));
      section.appendChild(createField('Stufe', 'level', 'number', character.level, { min: 1, max: 20 }));
      section.appendChild(createPassiveScoresCard());
      return page;
    }

    function createPassiveScoresCard() {
      const card = document.createElement('div');
      card.className = 'passive-card';
      const title = document.createElement('div');
      title.className = 'passive-card-title';
      title.textContent = 'Passive Werte';
      card.appendChild(title);
      [
        { label: 'Passive Wahrnehmung', skill: 'Perception' },
        { label: 'Passives Ermitteln', skill: 'Investigation' },
        { label: 'Passive Einsicht', skill: 'Insight' },
      ].forEach(item => {
        const row = document.createElement('div');
        row.className = 'passive-row';
        const label = document.createElement('div');
        label.textContent = item.label;
        const value = document.createElement('div');
        value.className = 'passive-value';
        value.textContent = getPassiveScore(item.skill);
        row.append(label, value);
        card.appendChild(row);
      });
      return card;
    }

    function createField(labelText, key, type, value, attrs = {}) {
      const wrapper = document.createElement('div');
      wrapper.className = 'field';
      const label = document.createElement('label');
      label.textContent = labelText;
      const input = document.createElement('input');
      input.type = type;
      input.value = value;
      Object.entries(attrs).forEach(([attr, val]) => input.setAttribute(attr, val));
      input.addEventListener('input', () => {
        if (type === 'number') {
          character[key] = Number(input.value) || 0;
        } else {
          character[key] = input.value;
        }
        saveCharacter();
        if ((key === 'class' || key === 'level') && currentPage === 4) {
          refreshSpellSlotsPage();
        }
      });
      wrapper.appendChild(label);
      wrapper.appendChild(input);
      return wrapper;
    }

    function buildStatsPage() {
      const page = document.createElement('section');
      page.className = 'page stats-page';
      const section = document.createElement('div');
      section.className = 'section stats-section';
      page.appendChild(section);
      populateStatsSection(section);
      return page;
    }

    function populateStatsSection(section) {
      section.innerHTML = '';

      const proficiencyCard = document.createElement('div');
      proficiencyCard.className = 'stats-card';
      const proficiencyTitle = document.createElement('div');
      proficiencyTitle.className = 'stats-card-title';
      proficiencyTitle.textContent = 'Proficiency Bonus';
      const proficiencyRow = document.createElement('div');
      proficiencyRow.className = 'stats-proficiency-row';
      const proficiencyInput = document.createElement('input');
      proficiencyInput.type = 'number';
      proficiencyInput.className = 'stats-input';
      proficiencyInput.min = '1';

      proficiencyInput.value = character.proficiencyBonus;
      proficiencyInput.dataset.role = 'proficiency-input';
      proficiencyInput.addEventListener('input', () => {

        renderStats();
      });

        abilitiesList.appendChild(createAbilityRow(ability));
      });

      const skillsSubpage = document.createElement('div');

      closeButton.type = 'button';
      closeButton.className = 'ability-skill-btn';
      closeButton.textContent = '← Zurück zu Werte';

        section.querySelector('[data-role="skill-subpage"]').classList.remove('active');

    function createAbilityRow(ability) {
      const row = document.createElement('div');
      row.className = 'ability-row';
      row.dataset.ability = ability;

      const label = document.createElement('div');
      label.className = 'ability-name';
      label.textContent = ability;

      const scoreInput = document.createElement('input');
      scoreInput.type = 'number';
      scoreInput.className = 'stats-input';
      scoreInput.min = '1';
      scoreInput.max = '30';
      scoreInput.value = character.stats[ability];
      scoreInput.addEventListener('input', () => {
        character.stats[ability] = Math.max(1, Math.min(30, Number(scoreInput.value) || 1));
        scoreInput.value = character.stats[ability];
        saveCharacter();
        renderStats();
      });

      const modifier = document.createElement('div');
      modifier.className = 'stats-badge';
      modifier.dataset.role = 'modifier';

      const saveWrap = document.createElement('label');
      saveWrap.className = 'checkbox-wrap';
      const saveCheckbox = document.createElement('input');
      saveCheckbox.type = 'checkbox';
      saveCheckbox.dataset.role = 'save-checkbox';
      saveCheckbox.checked = character.savingThrows[ability];
      saveCheckbox.addEventListener('change', () => {
        character.savingThrows[ability] = saveCheckbox.checked;
        saveCharacter();
        renderStats();
      });
      const saveLabel = document.createElement('span');
      saveLabel.textContent = 'Rettungswurf';
      saveWrap.append(saveCheckbox, saveLabel);

    function openAbilitySkills(ability) {
      const section = pagesContainer.querySelector('.stats-section');
      if (!section) return;
      const subpage = section.querySelector('[data-role="skill-subpage"]');
      const title = section.querySelector('[data-role="skill-subpage-title"]');
      const list = section.querySelector('[data-role="skill-subpage-list"]');
      if (!subpage || !title || !list) return;
      section.dataset.activeAbility = ability;
      title.textContent = `${ability}-Fertigkeiten`;
      const matchingSkills = skillDefinitions.filter(skill => skill.ability === ability);
      list.innerHTML = '';
      matchingSkills.forEach(skill => {
        list.appendChild(createSkillRow(skill));
      });
      subpage.classList.add('active');
      renderStats();
    }

    function getSkillStateText(skillData) {
      if (skillData.expertise) return 'EXPERTISE';
      if (skillData.proficient) return 'PROFICIENT';
      return 'NONE';
    }

    function cycleSkillState(skillData) {
      if (skillData.expertise) {
        skillData.expertise = false;
        skillData.proficient = false;
      } else if (skillData.proficient) {
        skillData.expertise = true;
        skillData.proficient = true;
      } else {
        skillData.proficient = true;
        skillData.expertise = false;
      }
    }

    function createSkillRow(skill) {
      const row = document.createElement('div');
      row.className = 'skill-row';
      row.dataset.skill = skill.name;

      const content = document.createElement('div');
      content.className = 'skill-card-content';
      const title = document.createElement('div');
      title.className = 'skill-title';
      const skillName = document.createElement('div');
      skillName.className = 'skill-name';
      skillName.textContent = skill.name;
      const skillAbility = document.createElement('div');
      skillAbility.className = 'skill-ability';
      skillAbility.textContent = `(${skill.ability})`;
      title.append(skillName, skillAbility);
      content.appendChild(title);

      const bonus = document.createElement('div');
      bonus.className = 'skill-bonus';
      bonus.dataset.role = 'skill-bonus';

      const stateButton = document.createElement('button');
      stateButton.type = 'button';
      stateButton.className = 'skill-state-button';
      stateButton.dataset.role = 'skill-state';
      stateButton.textContent = getSkillStateText(character.skills[skill.name]);
      stateButton.addEventListener('click', () => {
        const skillData = character.skills[skill.name];
        cycleSkillState(skillData);
        stateButton.textContent = getSkillStateText(skillData);
        saveCharacter();
        renderStats();
      });

      row.append(content, bonus, stateButton);
      return row;
    }

    function getSkillBonus(skillName) {
      const skillData = character.skills[skillName];
      const abilityMod = calcModifier(character.stats[skillData.ability]);
      let bonus = abilityMod;
      if (skillData.proficient) {
        bonus += character.proficiencyBonus;
      }
      if (skillData.expertise) {
        bonus += character.proficiencyBonus;
      }
      return bonus;
    }

    function getSavingThrowBonus(ability) {
      const abilityMod = calcModifier(character.stats[ability]);
      return character.savingThrows[ability] ? abilityMod + character.proficiencyBonus : abilityMod;
    }

    function getPassiveScore(skillName) {
      return 10 + getSkillBonus(skillName);
    }

    function renderStats() {
      const section = pagesContainer.querySelector('.stats-section');
      if (!section) return;

      const proficiencyInput = section.querySelector('[data-role="proficiency-input"]');
      if (proficiencyInput) {
        proficiencyInput.value = character.proficiencyBonus;
      }

      section.querySelectorAll('.ability-row').forEach(row => {
        const ability = row.dataset.ability;
        const scoreInput = row.querySelector('input[type="number"]');
        if (scoreInput) {
          scoreInput.value = character.stats[ability];
        }
        const modifier = row.querySelector('[data-role="modifier"]');
        if (modifier) {
          modifier.textContent = formatModifier(calcModifier(character.stats[ability]));
        }
        const saveCheckbox = row.querySelector('[data-role="save-checkbox"]');
        if (saveCheckbox) {
          saveCheckbox.checked = character.savingThrows[ability];
        }
      });

      const subpage = section.querySelector('[data-role="skill-subpage"]');
      const activeAbility = section.dataset.activeAbility;
      if (subpage && activeAbility && subpage.classList.contains('active')) {
        const list = section.querySelector('[data-role="skill-subpage-list"]');
        if (list) {
          list.querySelectorAll('.skill-row').forEach(row => {
            const skillName = row.dataset.skill;
            const skillData = character.skills[skillName];
            const bonus = row.querySelector('[data-role="skill-bonus"]');
            if (bonus) {
              bonus.textContent = formatModifier(getSkillBonus(skillName));
            }
            const stateButton = row.querySelector('[data-role="skill-state"]');
            if (stateButton) {
              stateButton.textContent = getSkillStateText(skillData);
            }
          });
        }
      }
    }

    function calcModifier(value) {
      return Math.floor((value - 10) / 2);
    }

    function formatModifier(value) {
      return (value >= 0 ? '+' : '') + value;
    }

    function getSpellcastingInfo() {
      const className = String(character.class || '').trim();
      const normalized = className.toLowerCase();
      if (halfCasterClasses.includes(normalized)) {
        return { type: 'Half Caster', typeLabel: 'Halbzauberer', subclass: className || 'Halbzauberer' };
      }
      return { type: 'Spellcasting', typeLabel: 'Zaubern', subclass: className || 'Vorbereitet' };
    }

    function getSpellLevelSlots(level) {
      const info = getSpellcastingInfo();
      if (info.type === 'Half Caster') {
        const charLevel = Math.min(20, Math.max(1, Number(character.level) || 1));
        return halfCasterProgression[charLevel][level] || 0;
      }
      const stored = character.spellSlots.find(s => s.level === level);
      return stored ? stored.max : 0;
    }

    function getVisibleSpellLevels() {
      const info = getSpellcastingInfo();
      if (info.type === 'Half Caster') {
        const charLevel = Math.min(20, Math.max(1, Number(character.level) || 1));
        const available = halfCasterProgression[charLevel];
        return spellLevels.filter(level => available[level] > 0);
      }
      return spellLevels;
    }

    function buildHealthPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';

      section.appendChild(createHealthCard('Current HP', 'current'));
      section.appendChild(createHealthCard('Max HP', 'max'));
      section.appendChild(createHealthCard('Temp HP', 'temp'));

      const combatButton = createButton('Kampfzähler', () => switchPage(pages.indexOf('Kampfzähler')));
      section.appendChild(combatButton);

      page.appendChild(section);
      return page;
    }

    function createHealthCard(labelText, key) {
      const card = document.createElement('div');
      card.className = 'card';
      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = labelText;
      let valueElement;
      if (key === 'max') {
        valueElement = document.createElement('input');
        valueElement.type = 'number';
        valueElement.className = 'card-input';
        valueElement.id = `healthInput-${key}`;
        valueElement.value = character.health[key];
        valueElement.addEventListener('input', () => {
          character.health[key] = Math.max(0, Number(valueElement.value) || 0);
          if (character.health.current > character.health.max) {
            character.health.current = character.health.max;
            const currentInput = document.getElementById('healthValue-current');
            if (currentInput) currentInput.textContent = character.health.current;
          }
          saveCharacter();
          renderHealth();
        });
      } else {
        valueElement = document.createElement('div');
        valueElement.className = 'card-value';
        valueElement.id = `healthValue-${key}`;
        valueElement.textContent = character.health[key];
      }
      card.append(title, valueElement);
      if (key !== 'max') {
        const buttonRow = document.createElement('div');
        buttonRow.className = 'button-row';
        ['-10', '-5', '-1', '+1', '+5', '+10'].forEach(label => {
          const button = document.createElement('div');
          button.className = 'pill';
          button.textContent = label;
          const delta = Number(label);
          button.addEventListener('click', () => adjustHealth(key, delta));
          buttonRow.appendChild(button);
        });
        card.appendChild(buttonRow);
      }
      return card;
    }

    function adjustHealth(key, delta) {
      const max = key === 'current' ? character.health.max : 999;
      character.health[key] = Math.max(0, Math.min(max, character.health[key] + delta));
      if (key === 'max' && character.health.current > character.health.max) {
        character.health.current = character.health.max;
      }
      renderHealth();
      saveCharacter();
    }

    function renderHealth() {
      ['current', 'temp'].forEach(key => {
        const value = document.getElementById(`healthValue-${key}`);
        if (value) value.textContent = character.health[key];
      });
      const maxInput = document.getElementById('healthInput-max');
      if (maxInput) maxInput.value = character.health.max;
    }

    function buildMoneyPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';
      moneyKeys.forEach(currency => {
        section.appendChild(createMoneyRow(currency));
      });
      page.appendChild(section);
      return page;
    }

    function createMoneyRow(currency) {
      const row = document.createElement('div');
      row.className = 'card';
      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = currencyLabels[currency] || currency;
      const input = document.createElement('input');
      input.type = 'number';
      input.className = 'card-input';
      input.id = `moneyInput-${currency}`;
      input.value = character.money[currency];
      input.addEventListener('input', () => {
        character.money[currency] = Math.max(0, Number(input.value) || 0);
        saveCharacter();
      });
      row.append(title, input);
      row.dataset.currency = currency;
      return row;

    function adjustMoney(currency, delta) {
      character.money[currency] = Math.max(0, character.money[currency] + delta);
      renderMoney();
      saveCharacter();
    }

    function renderMoney() {
      moneyKeys.forEach(currency => {
        const input = document.getElementById(`moneyInput-${currency}`);
        if (input) input.value = character.money[currency];
      });
    }

    function buildSpellSlotsPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';
      const info = getSpellcastingInfo();

      const header = document.createElement('div');
      header.className = 'spell-header';
      const title = document.createElement('div');
      title.className = 'spell-title';
      title.textContent = 'Zauberplätze';
      const subtitle = document.createElement('div');
      subtitle.className = 'spell-subtitle';

    function buildCombatCountersPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';

      const title = document.createElement('div');
      title.className = 'stats-card-title';
      title.textContent = 'Kampfzähler';

      const inputWrapper = document.createElement('div');
      inputWrapper.className = 'field';
      const inputLabel = document.createElement('label');
      inputLabel.textContent = 'Betrag';
      const inputField = document.createElement('input');
      inputField.type = 'number';
      inputField.className = 'stats-input';
      inputField.dataset.role = 'combat-counter-input';
      inputField.placeholder = '0';
      inputField.addEventListener('input', () => {
        if (inputField.value === '') return;
        inputField.value = String(Math.max(0, Number(inputField.value) || 0));
      });
      inputWrapper.append(inputLabel, inputField);

      const buttons = document.createElement('div');
      buttons.className = 'combat-counters-buttons';
      const buttonDefinitions = [
        { label: 'Schaden erhalten', key: 'damageTaken' },
        { label: 'Schaden verursacht', key: 'damageDealt' },
        { label: 'Heilung gegeben', key: 'healingGiven' },
        { label: 'Temporäre TP', key: 'temporaryHP' },
      ];

      buttonDefinitions.forEach(def => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'large-button';
        button.textContent = def.label;

          const amount = Number(inputField.value) || 0;
          if (amount <= 0) return;
          character.combatCounters[def.key] += amount;
          inputField.value = '';
          saveCharacter();
          renderCombatCounters();
        });
        buttons.append(button);
      });

      const totals = document.createElement('div');
      totals.className = 'combat-counters-totals';
      totals.dataset.role = 'combat-counters-totals';

    function renderCombatCounters() {
      const totalsContainer = document.querySelector('[data-role="combat-counters-totals"]');
      if (!totalsContainer) return;
      totalsContainer.innerHTML = '';
      const counters = [
        { label: 'Schaden erhalten', key: 'damageTaken' },
        { label: 'Schaden verursacht', key: 'damageDealt' },
        { label: 'Heilung gegeben', key: 'healingGiven' },
        { label: 'Temporäre TP', key: 'temporaryHP' },
      ];
      counters.forEach(counter => {
        const row = document.createElement('div');
        row.className = 'counter-total-row';
        const label = document.createElement('div');
        label.textContent = `${counter.label}: ${character.combatCounters[counter.key] || 0}`;
        const resetButton = document.createElement('button');
        resetButton.type = 'button';
        resetButton.className = 'counter-reset-button';
        resetButton.textContent = 'Zurücksetzen';
        resetButton.addEventListener('click', () => {
          character.combatCounters[counter.key] = 0;
          saveCharacter();
          renderCombatCounters();
        });
        row.append(label, resetButton);

      });

    function createSpellRowHeader() {
      const header = document.createElement('div');
      header.className = 'spell-row header-row';
      const levelHeader = document.createElement('div');
      levelHeader.textContent = 'Spell Level';
      const maxHeader = document.createElement('div');
      maxHeader.textContent = 'Maximum Slots';
      const remainingHeader = document.createElement('div');
      remainingHeader.textContent = 'Remaining Slots';
      header.append(levelHeader, maxHeader, remainingHeader);
      return header;
    }

    function createSpellSlotRow(level) {
      const row = document.createElement('div');
      row.className = 'spell-row';
      const label = document.createElement('div');
      label.className = 'spell-level';
      const badge = document.createElement('div');
      badge.className = 'spell-badge';
      badge.textContent = level;
      const labelText = document.createElement('div');
      labelText.textContent = `Level ${level}`;
      label.append(badge, labelText);

      const totalBox = document.createElement('div');
      totalBox.className = 'spell-total';
      const maxInput = document.createElement('input');
      maxInput.type = 'number';
      maxInput.min = 0;
      maxInput.value = getSpellLevelSlots(level);
      maxInput.addEventListener('input', () => {
        const slot = getOrCreateSpellSlot(level);
        slot.max = Math.max(0, Number(maxInput.value) || 0);
        if (slot.used > slot.max) slot.used = slot.max;
        renderSpellSlots();
        saveCharacter();
      });
      totalBox.append(maxInput);

      const circles = document.createElement('div');
      circles.className = 'spell-circles';
      const slot = getOrCreateSpellSlot(level);
      slot.max = Number(maxInput.value);
      createSlotCircles(slot, circles);

      row.append(label, totalBox, circles);
      row.dataset.level = level;
      return row;
    }

    function getOrCreateSpellSlot(level) {
      let slot = character.spellSlots.find(s => s.level === level);
      if (!slot) {
        slot = { level, max: 0, used: 0 };
        character.spellSlots.push(slot);
      }
      return slot;
    }

    function createSlotCircles(slot, container) {
      container.innerHTML = '';
      for (let i = 0; i < slot.max; i += 1) {
        const circle = document.createElement('div');
        circle.className = 'slot-circle' + (i < slot.used ? ' used' : '');
        circle.textContent = i + 1;
        circle.addEventListener('click', () => {
          slot.used = i + 1 === slot.used ? i : i + 1;
          if (slot.used > slot.max) slot.used = slot.max;
          renderSpellSlots();
          saveCharacter();
        });
        container.appendChild(circle);
      }
    }

    function renderSpellSlots() {
      const rows = pagesContainer.querySelectorAll('.spell-row');
      rows.forEach(row => {
        const level = Number(row.dataset.level);
        const slot = character.spellSlots.find(s => s.level === level);
        if (!slot) return;
        const circles = row.querySelector('.spell-circles');
        if (circles) createSlotCircles(slot, circles);
        const input = row.querySelector('input[type="number"]');
        if (input) input.value = slot.max;
      });
    }

    function buildSettingsPage() {
      const page = document.createElement('section');
      page.className = 'page';
      const section = document.createElement('div');
      section.className = 'section';
      const exportButton = createButton('Charakter exportieren', handleExport);
      const copyButton = createButton('Code kopieren', handleCopyCode);
      const importButton = createButton('Charakter importieren', handleImport);
      const clearButton = createButton('Speicher löschen', handleClearSave, 'destructive');
      const textareaWrap = document.createElement('div');
      textareaWrap.className = 'textarea-wrap';
      const textareaLabel = document.createElement('div');
      textareaLabel.className = 'help-text';
      textareaLabel.textContent = 'Füge hier einen Share-Code ein, um ihn zu importieren, oder exportiere einen unten.';
      const textarea = document.createElement('textarea');
      textarea.id = 'shareCodeArea';
      textarea.placeholder = 'INK1:...';
      textareaWrap.append(textareaLabel, textarea);
      section.append(exportButton, copyButton, importButton, clearButton, textareaWrap);
      page.appendChild(section);
      return page;
    }

    function createCharacterCode(data) {
      const json = JSON.stringify(data);
      const encoded = encodeTextToBase64(json);
      return `INK1:${encoded}`;
    }

    function encodeTextToBase64(text) {
      const utf8Bytes = new TextEncoder().encode(text);
      let binary = '';
      utf8Bytes.forEach(byte => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary);
    }

    function decodeCharacterCode(code) {
      if (typeof code !== 'string' || !code.startsWith('INK1:')) {
        throw new Error('Invalid share code prefix.');
      }
      const payload = code.slice('INK1:'.length).trim();
      if (!payload) {
        throw new Error('Share code is empty.');
      }
      const binary = atob(payload);
      const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    function validateCharacterCode(code) {
      if (typeof code !== 'string') return false;
      try {
        const decoded = decodeCharacterCode(code);
        const parsed = JSON.parse(decoded);
        return parsed && typeof parsed === 'object' && !Array.isArray(parsed);
      } catch (error) {
        return false;
      }
    }

    function handleExport() {
      const shareCodeArea = document.getElementById('shareCodeArea');
      const exportText = createCharacterCode(character);
      shareCodeArea.value = exportText;
      statusBar.textContent = 'Charakter-Share-Code wurde erstellt.';
    }

    function handleCopyCode() {
      const shareCodeArea = document.getElementById('shareCodeArea');
      const code = (shareCodeArea.value || '').trim();
      if (!code) {
        statusBar.textContent = 'Exportiere zuerst einen Charakter, um einen Share-Code zu erstellen.';
        return;
      }
      copyText(code);
      statusBar.textContent = 'Share-Code in die Zwischenablage kopiert.';
    }

    function handleImport() {
      const shareCodeArea = document.getElementById('shareCodeArea');
      const code = (shareCodeArea.value || '').trim();
      if (!code) {
        statusBar.textContent = 'Gib einen Share-Code zum Importieren ein.';
        return;
      }
      if (!validateCharacterCode(code)) {
        statusBar.textContent = 'Ungültiger Share-Code. Bitte überprüfe den Code und versuche es erneut.';
        return;
      }
      try {
        const decoded = decodeCharacterCode(code);
        const parsed = JSON.parse(decoded);
        character = mergeCharacter(characterTemplate, parsed);
        renderAll();
        saveCharacter();
        statusBar.textContent = 'Charakter erfolgreich importiert.';
      } catch (error) {
        statusBar.textContent = 'Charakter konnte nicht importiert werden. Der Share-Code ist möglicherweise ungültig.';
      }
    }

    function handleClearSave() {
      localStorage.removeItem(STORAGE_KEY);
      character = JSON.parse(JSON.stringify(characterTemplate));
      renderAll();
      saveCharacter();
      statusBar.textContent = 'Speicher gelöscht. Vorlage wiederhergestellt.';
    }

    function copyText(text) {
      try {
        navigator.clipboard.writeText(text).catch(() => {});
      } catch (error) {
        console.warn('Clipboard not available.', error);
      }
    }

    function restoreAllSlots() {
      character.spellSlots.forEach(slot => {
        slot.used = 0;
      });
      renderSpellSlots();
      saveCharacter();
    }

    function clearAllSlots() {
      character.spellSlots.forEach(slot => {
        slot.max = 0;
        slot.used = 0;
      });
      renderSpellSlots();
      saveCharacter();
    }

    function refreshSpellSlotsPage() {
      const page = pagesContainer.children[4];
      if (!page) return;
      const section = page.querySelector('.section');
      if (!section) return;
      section.innerHTML = '';
      const info = getSpellcastingInfo();
      const header = document.createElement('div');
      header.className = 'spell-header';
      const title = document.createElement('div');
      title.className = 'spell-title';
      title.textContent = 'Zauberplätze';
      const subtitle = document.createElement('div');
      subtitle.className = 'spell-subtitle';
      subtitle.textContent = `Zaubern: ${info.type} (${info.subclass})`;
      header.append(title, subtitle);
      const table = document.createElement('div');
      table.className = 'spell-table';
      table.appendChild(createSpellRowHeader());
      const visibleLevels = getVisibleSpellLevels();
      if (visibleLevels.length === 0) {
        const noSlots = document.createElement('div');
        noSlots.className = 'spell-no-slots';
        noSlots.textContent = 'Auf dieser Stufe sind keine Zauberplätze verfügbar.';
        table.appendChild(noSlots);
      } else {
        visibleLevels.forEach(level => table.appendChild(createSpellSlotRow(level)));
      }
      const actionRow = document.createElement('div');
      actionRow.className = 'spell-actions';
      const restoreButton = createButton('Alle Plätze wiederherstellen', restoreAllSlots);
      const clearButton = createButton('Alle löschen', clearAllSlots);
      actionRow.append(restoreButton, clearButton);
      section.append(header, table, actionRow);
      renderSpellSlots();
    }

    function renderAll() {
      pagesContainer.innerHTML = '';
      buildApp();
      renderStats();
      renderHealth();
      renderMoney();
      renderSpellSlots();
      renderCombatCounters();
      const jsonArea = document.getElementById('jsonArea');
      if (jsonArea) jsonArea.value = '';
    }

    buildApp();
    saveCharacter();
  </script>
</body>
</html>
